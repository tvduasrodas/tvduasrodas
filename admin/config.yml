backend:
  name: github
  repo: tvduasrodas/tvduasrodas
  branch: main
  base_url: "https://sveltia-cms-auth.tvduasrodas.workers.dev"

site_url: "https://tvduasrodas.com/"
display_url: "https://tvduasrodas.com/"

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  # 1) VÍDEOS / EPISÓDIOS DO CANAL
  - name: "videos"
    label: "Vídeos"
    label_singular: "Vídeo"
    folder: "content/videos"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sort: "date:desc"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data de publicação", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "URL do YouTube", name: "youtube_url", widget: "string", hint: "Cole aqui o link completo do vídeo no YouTube" }
      - { label: "Duração (opcional)", name: "duration", widget: "string", required: false, hint: "Ex: 12:34" }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options:
          - { label: "Cassetadas", value: "cassetadas" }
          - { label: "Cross", value: "cross" }
          - { label: "Competições", value: "competicoes" }
          - { label: "Eventos", value: "eventos" }
          - { label: "Urbano e Mobilidade", value: "urbano" }
          - { label: "Lançamentos", value: "lancamentos" }
          - { label: "Testes e Avaliações", value: "testes" }
          - { label: "Dicas e Mecânica", value: "dicas" }
          - { label: "Tecnologia", value: "tecnologia" }
          - { label: "Viagem e Turismo", value: "viagem" }
          - { label: "História e Cultura", value: "historia" }
          - { label: "Customização", value: "customizacao" }
          - { label: "Institucional", value: "institucional" }
          - { label: "Outros", value: "outros" }
        default: "outros"
        hint: "Escolha a categoria editorial específica. Use Outros somente quando nenhuma das categorias disponíveis representar o vídeo."
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Ex: honda, yamaha, viagem" }
      - { label: "Destaque na Home?", name: "featured", widget: "boolean", default: false }
      - label: "Thumbnail"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "Imagem de capa do vídeo"
      - { label: "Descrição / Texto do vídeo", name: "body", widget: "markdown", hint: "Resumo + detalhes do vídeo" }

  # 2) NOTÍCIAS / ARTIGOS
  - name: "news"
    label: "Notícias"
    label_singular: "Notícia"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sort: "date:desc"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Autor", name: "author", widget: "string", required: false, default: "TVDUASRODAS" }
      - { label: "Categoria", name: "category", widget: "select", options: [{label: "Motos", value: "Moto"}, {label: "Lançamentos", value: "Lancamentos"}, {label: "Testes", value: "tests"}, {label: "Bikes", value: "bikes"}, {label: "Eventos", value: "Eventos"}, {label: "Urbanização e mobilidade", value: "Urbanizacao"}, {label: "Dicas", value: "Dicas"}, {label: "Segurança", value: "Seguranca"}, {label: "Tecnologia", value: "Tecnologia"}, {label: "Outro", value: "Outro"}], default: "Moto" }
      - label: "Programa da Revista"
        name: "program"
        widget: "select"
        required: false
        default: ""
        options:
          - { label: "Nenhum programa", value: "" }
          - { label: "Rolê de Rua", value: "role-de-rua" }
          - { label: "Estrada Aberta", value: "estrada-aberta" }
          - { label: "Garage Tech", value: "garage-tech" }
          - { label: "Electric Zone", value: "electric-zone" }
        hint: "Selecione somente quando a matéria for um episódio de um programa fixo."
      - { label: "Nome do programa", name: "programLabel", widget: "string", required: false, hint: "Ex.: Electric Zone" }
      - { label: "Duração editorial", name: "episodeDuration", widget: "string", required: false, default: "45 min" }
      - { label: "Tempo de leitura", name: "readingTime", widget: "string", required: false, hint: "Ex.: 14 min" }
      - { label: "Resumo SEO", name: "summary", widget: "text", required: false }
      - { label: "Título SEO", name: "seoTitle", widget: "string", required: false, hint: "Título curto para Google e redes sociais." }
      - { name: "videoId", label: "ID do vídeo (YouTube)", widget: "string", required: false }
      - { label: "Imagem principal", name: "cover", widget: "image", required: false }
      - { label: "Destacar na capa da Revista?", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }

  # 3) COMPETIÇÕES
  - name: "competitions"
    label: "Competições"
    label_singular: "Competição"
    folder: "content/competitions"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    summary: "{{title}} — temporada {{season}}"
    filter: { field: "title", pattern: ".+" }
    fields:
      - { label: "Nome completo", name: "title", widget: "string" }
      - { label: "Nome curto", name: "short_name", widget: "string" }
      - { label: "Temporada", name: "season", widget: "string", default: "2026" }
      - { label: "País", name: "country", widget: "string", default: "Brasil" }
      - { label: "Abrangência", name: "scope", widget: "select", options: ["Estadual", "Nacional", "Continental", "Mundial"], default: "Nacional" }
      - { label: "Modalidade", name: "modality", widget: "string" }
      - { label: "Situação", name: "status", widget: "select", options: [{label: "Em andamento", value: "em_andamento"}, {label: "Agendada", value: "agendada"}, {label: "Concluída", value: "concluida"}, {label: "Cancelada", value: "cancelado"}], default: "em_andamento" }
      - { label: "Organizador", name: "organizer", widget: "string" }
      - { label: "Site oficial", name: "official_url", widget: "string" }
      - { label: "Resultados oficiais", name: "results_url", widget: "string", required: false }
      - { label: "Imagem de capa", name: "cover", widget: "image", required: false }
      - { label: "Crédito da imagem", name: "image_credit", widget: "string", required: false }
      - { label: "Fonte da imagem", name: "image_source", widget: "string", required: false }
      - { label: "Destaque", name: "featured", widget: "boolean", default: false }
      - { label: "Resumo", name: "summary", widget: "text" }
      - { label: "Última atualização", name: "last_updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - label: "Próxima etapa"
        name: "next_stage"
        widget: "object"
        required: false
        fields:
          - { label: "Nome", name: "name", widget: "string", required: false }
          - { label: "Data inicial", name: "start_date", widget: "date", format: "YYYY-MM-DD", required: false }
          - { label: "Data final", name: "end_date", widget: "date", format: "YYYY-MM-DD", required: false }
          - { label: "Local", name: "venue", widget: "string", required: false }
          - { label: "Cidade", name: "city", widget: "string", required: false }
          - { label: "Estado", name: "state", widget: "string", required: false }
          - { label: "Observação", name: "note", widget: "string", required: false }
      - { label: "Categorias", name: "categories", widget: "list", required: false }
      - label: "Classificação"
        name: "standings"
        widget: "list"
        required: false
        fields:
          - { label: "Categoria", name: "category", widget: "string" }
          - { label: "Posição", name: "position", widget: "number", value_type: "int" }
          - { label: "Competidor", name: "competitor", widget: "string" }
          - { label: "Equipe", name: "team", widget: "string", required: false }
          - { label: "Pontos", name: "points", widget: "number" }
      - label: "Etapas e resultados"
        name: "rounds"
        widget: "list"
        required: false
        fields:
          - { label: "Ordem", name: "order", widget: "number", value_type: "int" }
          - { label: "Data inicial", name: "start_date", widget: "date", format: "YYYY-MM-DD" }
          - { label: "Data final", name: "end_date", widget: "date", format: "YYYY-MM-DD", required: false }
          - { label: "Nome", name: "name", widget: "string" }
          - { label: "Local", name: "location", widget: "string" }
          - { label: "Situação", name: "status", widget: "select", options: [{label: "Agendada", value: "agendada"}, {label: "Concluída", value: "concluida"}, {label: "Cancelada", value: "cancelado"}] }
          - { label: "Vencedor(es)", name: "winner", widget: "text", required: false }
          - { label: "Link do resultado", name: "results_url", widget: "string", required: false }
      - label: "Vídeos relacionados"
        name: "related_videos"
        widget: "list"
        required: false
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Texto explicativo", name: "body", widget: "markdown", required: false }

  # 4) EVENTOS
  - name: "events"
    label: "Eventos"
    label_singular: "Evento"
    folder: "content/events"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    summary: "{{title}} — {{start_date}}"
    filter: { field: "title", pattern: ".+" }
    fields:
      - { label: "Nome do evento", name: "title", widget: "string" }
      - { label: "Data inicial", name: "start_date", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Data final", name: "end_date", widget: "date", format: "YYYY-MM-DD", required: false }
      - { label: "Cidade", name: "city", widget: "string" }
      - { label: "Estado", name: "state", widget: "string" }
      - { label: "Local", name: "venue", widget: "string" }
      - { label: "Situação", name: "status", widget: "select", options: [{label: "Próximo", value: "proximo"}, {label: "Em andamento", value: "em_andamento"}, {label: "Encerrado", value: "encerrado"}, {label: "Cancelado", value: "cancelado"}], default: "proximo" }
      - { label: "Tipo", name: "event_type", widget: "string" }
      - { label: "Site oficial", name: "official_url", widget: "string" }
      - { label: "Ingressos / acesso", name: "ticket_url", widget: "string", required: false }
      - { label: "Sala de imprensa", name: "press_url", widget: "string", required: false }
      - { label: "Imagem de capa", name: "cover", widget: "image", required: false }
      - { label: "Crédito da imagem", name: "image_credit", widget: "string", required: false }
      - { label: "Destaque", name: "featured", widget: "boolean", default: false }
      - { label: "Entrada gratuita", name: "free", widget: "boolean", default: false }
      - { label: "Resumo", name: "summary", widget: "text" }
      - { label: "Atrações", name: "attractions", widget: "list", required: false }
      - label: "Vídeos"
        name: "videos"
        widget: "list"
        required: false
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Informações completas", name: "body", widget: "markdown", required: false }
      - { label: "Última atualização", name: "last_updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }

  # 5) PÁGINAS FIXAS (SOBRE, CONTATO, ETC.)
  - name: "pages"
    label: "Páginas"
    label_singular: "Página"
    files:
      - file: "content/pages/sobre.md"
        name: "sobre"
        label: "Sobre"
        fields:
          - { label: "Título", name: "title", widget: "string", default: "Sobre a TVDUASRODAS" }
          - { label: "Conteúdo", name: "body", widget: "markdown" }

      - file: "content/pages/contato.md"
        name: "contato"
        label: "Contato"
        fields:
          - { label: "Título", name: "title", widget: "string", default: "Fale com a TVDUASRODAS" }
          - { label: "E-mail de contato", name: "email", widget: "string", required: false }
          - { label: "WhatsApp (link)", name: "whatsapp", widget: "string", required: false, hint: "Ex: https://wa.me/55DDDNUMERO" }
          - { label: "Conteúdo", name: "body", widget: "markdown", required: false }
  
  
          # 4) HOME / CONFIGURAÇÕES (STATUS + PLAYER)
  - name: "home"
    label: "Home"
    label_singular: "Home"
    delete: false
    editor:
      preview: false
    files:
      - file: "content/home/live-status.md"
        name: "live_status"
        label: "Status da Live"
        fields:
          - label: "Título da seção"
            name: "title"
            widget: "string"
            default: "Live Stream"
          - label: "Estamos ao vivo?"
            name: "featured"
            widget: "boolean"
            default: false
          - label: "URL da transmissão (YouTube, Twitch, etc.)"
            name: "youtube_url"
            widget: "string"
            required: false
          - label: "Texto de descrição"
            name: "body"
            widget: "markdown"
            required: false
            default: "Quando estivermos ao vivo, este espaço será ocupado pela transmissão em tempo real (YouTube Live, Twitch ou outro player)."

      - file: "content/home/hero-player.md"
        name: "hero_player"
        label: "Player principal (Home)"
        fields:
          - label: "Título do player"
            name: "title"
            widget: "string"
            default: "Player principal TVDUASRODAS"
          - label: "URL ou ID do vídeo (YouTube)"
            name: "youtube_url"
            widget: "string"
            hint: "Cole a URL completa ou só o ID do vídeo (ex: xcPxjtQU1qc)"

          - label: "Descrição (opcional)"
            name: "body"
            widget: "markdown"
            required: false



